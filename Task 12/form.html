<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Form</title>
</head>
<body>
    
    <form>

        <label>Name:</label>
        <input type="text" placeholder="Enter the name"> <br> <br>

        <label>Email:</label>
        <input type="email" placeholder="Enter the email" > <br> <br>

        <label>Password:</label>
        <input type="password" placeholder="Enter the password"> <br> <br>

        <label>Gender:</label><br><br>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label> <br>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label> <br>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label><br><br>

        <label>Skills:</label><br><br>

        <input type="checkbox" id="html" name="gender" value="html">
        <label for="html">HTML</label><br>
        
        <input type="checkbox" id="css" name="gender" value="css">
        <label for="css">CSS</label><br>

        <input type="checkbox" id="js" name="gender" value="js">
        <label for="js">JavaScript</label><br><br>

        <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="">Select Country</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="america">America</option>
            <option value="london">London</option>
            <option value="uk">UK</option>
            <option value="canada">Canada</option>
        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Register">
    </form>
</body>
</html>
