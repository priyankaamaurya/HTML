<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    
    <h2>Registration Form</h2>

    <form> 

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required maxlength="20"> <br> <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required> <br> <br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required pattern="[0-9a-zA-z]{6,}"> <br> <br>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" placeholder="10 digit number" pattern="[0-9]{10}" required> <br> <br>

        <label>Gender:</label> <br> 
        <input type="radio" name="gender" required> Male<br>
        <input type="radio" name="gender"> Female<br> 
        <input type="radio" name="gender"> Other<br>  <br>

        <label>Skills:</label> <br>
        <input type="checkbox"> HTML<br>
        <input type="checkbox"> CSS<br> 
        <input type="checkbox"> JS<br> <br>

        <label>Country:</label>
        <select required>
            <option value="">Select Country</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select> <br> <br>
        
        <label>Message:</label> <br>
        <textarea rows="4" cols="30" placeholder="Enter your message" maxlength="100"></textarea> <br> <br> 

        <input type="submit" value="Submit">

    </form>
</body>
</html>
