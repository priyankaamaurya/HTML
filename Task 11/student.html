<head>

    <title>Student Report Table</title>
</head>
<body>

        <tr align="center"> 
            <th>Name</th>
            <th>Roll No</th>
            <th>Subject</th>

        <tr align="center">
            <td rowspan="3" valign="top">Priyanka</td>
            <td rowspan="3" valign="top">101</td>
            <td>HTML</td>
            <td>90</td>
        </tr>

        <tr align="center">
            <td>CSS</td>
            <td>85</td>
        </tr>

        <tr align="center">
            <td>JS</td>
            <td>88</td>
        </tr>

    </table>
</body>
</html>
