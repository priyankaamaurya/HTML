<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <form action="">

    <h2> Registration Form </h2>
    
    <label> Name: </label>
    Name <input type="text" placeholder="Enter name"> 
    <br><br>

    <label> Email: </label> 
    <input type="email" placeholder="Enter Email"> 
    <br><br>

    <label> Password: </label> 
    <input type="password" placeholder="Enter Password"> 
    <br><br>

    <label> Gender: </label> <br>
    <input type="radio" name="gender"> Male </input>
    <input type="radio" name="gender"> Female </input>
    <input type="radio" name="gender"> Other </input>
    <br><br>
    
    <label> Skills: </label> <br>
    <input type="checkbox"> HTML <br>
    <input type="checkbox"> CSS <br>
    <input type="checkbox"> JavaScript <br>
    <br><br>

    <input type="submit" value="Register">

    </form>

</body>
</html>
