<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Restaurant</title>
</head>
<body>
    
    <header>
        <h1>Delicious Bites</h1>
        <p>Welcome to our Restaurant</p>
        <hr>
    </header>

    <h2>Menu</h2>

    <table border="1">
        <tr>
            <th>Dish</th>
            <th>Price</th>
        </tr>
        <tr>
            <th>Pizza</th>
            <th>₹200</th>
        </tr>
        <tr>
            <th>Burger</th>
            <th>₹150</th>
        </tr>
        <tr>
            <th>Pasta</th>
            <th>₹180</th>
        </tr>
    </table>

    <h2>Our Special Dishes</h2>

    <img src="menu.jpg" width="250">
    <img src="restaurant.jpg" width="290">
    <img src="pizza.jpg" width="340">
    <img src="pasta.jpg" width="340">
    <img src="lawn.jpg" width="390">
    <img src="menuu.jpg" width="200">

    <h2>Contact Us</h2>

    <form>

        <label>Name:</label>
        <input type="text" required> <br><br>

        <label>Email:</label>
        <input type="email" required> <br><br>

        <label>Message:</label> <br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Send">

    </form>

    <footer>
        <hr>
        <p>© 2026 Delicious Bites</p>
    </footer>

</body>
</html>
